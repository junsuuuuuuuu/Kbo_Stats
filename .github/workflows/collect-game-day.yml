name: Collect KBO game day

on:
  schedule:
    # 23:30 KST during the regular-season months.
    - cron: "30 14 * 3-10 *"
  workflow_dispatch:
    inputs:
      game_date:
        description: "Optional game date (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install .
      - run: python -m alembic upgrade head
      - name: Collect and store game-day snapshot
        env:
          GAME_DATE: ${{ inputs.game_date }}
        run: |
          if [ -n "$GAME_DATE" ]; then
            python -m scripts.collect_game_day --date "$GAME_DATE"
          else
            python -m scripts.collect_game_day
          fi
