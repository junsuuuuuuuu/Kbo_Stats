services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kbo_stats
      MYSQL_USER: kbo_user
      MYSQL_PASSWORD: local_kbo_password
      MYSQL_ROOT_PASSWORD: local_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: docker
      DATABASE_URL: mysql+pymysql://kbo_user:local_kbo_password@mysql:3306/kbo_stats?charset=utf8mb4
      CORS_ORIGINS: '["http://localhost:3000"]'
      ML_N_JOBS: "1"
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
